name: Golden Matrix

# Validates golden .ttis state files and (on hardware runners) replays them
# to confirm the exact package set still installs and passes the full
# write → validate → read schema loop.
#
# Two-stage design:
#   1. validate   — parse and schema-check every golden/*.ttis file (no hardware needed)
#   2. replay     — install from a golden file on a real machine, then:
#                     a. export the post-install state to a new .ttis file
#                     b. validate the exported file
#                     c. import (round-trip) the exported file via ttis_import
#                     d. run core smoke tests
#                   (requires a self-hosted runner with TT hardware attached)
#
# Trigger this workflow:
#   - Manually via workflow_dispatch (choose which golden file to replay)
#   - Automatically on PRs that touch golden/*.ttis or ttis.sh

on:
  workflow_dispatch:
    inputs:
      golden_file:
        description: 'Golden file to replay (e.g. golden/ubuntu-22.04.ttis)'
        required: false
        default: ''
  pull_request:
    paths:
      - 'golden/**'
      - 'ttis.sh'
      - 'install.m4'

jobs:
  # ── Stage 1: schema validation (runs on every PR, no hardware required) ──────
  validate-golden-files:
    name: Validate golden files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all golden files
        run: |
          set -euo pipefail
          failed=0
          for f in golden/*.ttis; do
            echo "── Validating $f ──"
            if bash ttis.sh validate "$f"; then
              echo "✓ $f"
            else
              echo "✗ $f"
              failed=$((failed + 1))
            fi
          done
          if [[ "$failed" -gt 0 ]]; then
            echo "::error::$failed golden file(s) failed validation"
            exit 1
          fi
          echo "All golden files are valid."

  # ── Stage 2: build install.sh (prerequisite for replay) ─────────────────────
  build:
    name: Build installer
    runs-on: ubuntu-latest
    needs: validate-golden-files
    # Only build when we might replay (manual trigger or golden file changed)
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.changed_files, 'golden/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate install.sh from install.m4
        run: |
          docker run --rm \
            -e PROGRAM=argbash \
            -v "$(pwd):/work" \
            -u "$(id -u):$(id -g)" \
            matejak/argbash \
            install.m4 -o install.sh

      - name: Upload install.sh
        uses: actions/upload-artifact@v4
        with:
          name: install-script-golden
          path: |
            install.sh
            ttis.sh
            golden/

  # ── Stage 3: replay on hardware (self-hosted runners required) ───────────────
  # Each runner must be tagged with the distro it runs, e.g. [self-hosted, ubuntu-22.04, tt-hardware]
  # This job is skipped in CI unless a self-hosted runner is available.
  replay-ubuntu-2204:
    name: Replay — Ubuntu 22.04
    runs-on: [self-hosted, ubuntu-22.04, tt-hardware]
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.golden_file == '' || github.event.inputs.golden_file == 'golden/ubuntu-22.04.ttis')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: install-script-golden

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate golden file before replay
        run: bash ttis.sh validate golden/ubuntu-22.04.ttis

      - name: Replay golden state
        run: |
          chmod +x install.sh
          bash install.sh \
            --import-schema golden/ubuntu-22.04.ttis \
            --export-schema /tmp/tt-state-replay.ttis \
            --reboot-option=never

      - name: Schema write/validate/read
        run: |
          echo "── Schema write ──"
          test -f /tmp/tt-state-replay.ttis || { echo "✗ Schema not written"; exit 1; }
          echo "✓ Schema written:"
          cat /tmp/tt-state-replay.ttis

          echo "── Schema validate ──"
          bash ttis.sh validate /tmp/tt-state-replay.ttis
          echo "✓ Schema valid"

          echo "── Schema import round-trip ──"
          DISTRO_ID="$(. /etc/os-release && printf '%s' "${ID}")"
          PKG_MANAGER=apt-get DISTRO_ID="${DISTRO_ID}" bash -c '
            source ttis.sh
            ttis_import /tmp/tt-state-replay.ttis
            [[ "${_arg_install_kmd:-}" =~ ^(on|off)$ ]] || { echo "✗ _arg_install_kmd not set"; exit 1; }
            echo "✓ _arg_install_kmd=${_arg_install_kmd}"
          '
          echo "✓ Schema import round-trip complete"

      - name: Core tests
        run: |
          set -euo pipefail
          echo "── tt-smi smoke test ──"
          tt-smi --version
          echo "── KMD loaded ──"
          lsmod | grep tenstorrent
          echo "── tt-flash available ──"
          tt-flash --version
          echo "✓ Core tests passed"

  replay-ubuntu-2404:
    name: Replay — Ubuntu 24.04
    runs-on: [self-hosted, ubuntu-24.04, tt-hardware]
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.golden_file == '' || github.event.inputs.golden_file == 'golden/ubuntu-24.04.ttis')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: install-script-golden

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate golden file before replay
        run: bash ttis.sh validate golden/ubuntu-24.04.ttis

      - name: Replay golden state
        run: |
          chmod +x install.sh
          bash install.sh \
            --import-schema golden/ubuntu-24.04.ttis \
            --export-schema /tmp/tt-state-replay.ttis \
            --reboot-option=never

      - name: Schema write/validate/read
        run: |
          echo "── Schema write ──"
          test -f /tmp/tt-state-replay.ttis || { echo "✗ Schema not written"; exit 1; }
          echo "✓ Schema written:"
          cat /tmp/tt-state-replay.ttis

          echo "── Schema validate ──"
          bash ttis.sh validate /tmp/tt-state-replay.ttis
          echo "✓ Schema valid"

          echo "── Schema import round-trip ──"
          DISTRO_ID="$(. /etc/os-release && printf '%s' "${ID}")"
          PKG_MANAGER=apt-get DISTRO_ID="${DISTRO_ID}" bash -c '
            source ttis.sh
            ttis_import /tmp/tt-state-replay.ttis
            [[ "${_arg_install_kmd:-}" =~ ^(on|off)$ ]] || { echo "✗ _arg_install_kmd not set"; exit 1; }
            echo "✓ _arg_install_kmd=${_arg_install_kmd}"
          '
          echo "✓ Schema import round-trip complete"

      - name: Core tests
        run: |
          set -euo pipefail
          echo "── tt-smi smoke test ──"
          tt-smi --version
          echo "── KMD loaded ──"
          lsmod | grep tenstorrent
          echo "── tt-flash available ──"
          tt-flash --version
          echo "✓ Core tests passed"

  replay-fedora-42:
    name: Replay — Fedora 42
    runs-on: [self-hosted, fedora-42, tt-hardware]
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.golden_file == '' || github.event.inputs.golden_file == 'golden/fedora-42.ttis')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: install-script-golden

      - name: Install jq
        run: sudo dnf install -y jq

      - name: Validate golden file before replay
        run: bash ttis.sh validate golden/fedora-42.ttis

      - name: Replay golden state
        run: |
          chmod +x install.sh
          bash install.sh \
            --import-schema golden/fedora-42.ttis \
            --export-schema /tmp/tt-state-replay.ttis \
            --reboot-option=never

      - name: Schema write/validate/read
        run: |
          echo "── Schema write ──"
          test -f /tmp/tt-state-replay.ttis || { echo "✗ Schema not written"; exit 1; }
          echo "✓ Schema written:"
          cat /tmp/tt-state-replay.ttis

          echo "── Schema validate ──"
          bash ttis.sh validate /tmp/tt-state-replay.ttis
          echo "✓ Schema valid"

          echo "── Schema import round-trip ──"
          DISTRO_ID="$(. /etc/os-release && printf '%s' "${ID}")"
          PKG_MANAGER=dnf DISTRO_ID="${DISTRO_ID}" bash -c '
            source ttis.sh
            ttis_import /tmp/tt-state-replay.ttis
            [[ "${_arg_install_kmd:-}" =~ ^(on|off)$ ]] || { echo "✗ _arg_install_kmd not set"; exit 1; }
            echo "✓ _arg_install_kmd=${_arg_install_kmd}"
          '
          echo "✓ Schema import round-trip complete"

      - name: Core tests
        run: |
          set -euo pipefail
          echo "── tt-smi smoke test ──"
          tt-smi --version
          echo "── KMD loaded ──"
          lsmod | grep tenstorrent
          echo "── tt-flash available ──"
          tt-flash --version
          echo "✓ Core tests passed"
