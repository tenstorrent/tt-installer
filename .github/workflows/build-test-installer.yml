name: Build and Test Installer

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set version variables
        id: version
        run: |
          # Extract version with 'v' prefix for GitHub paths
          TAG_VERSION=${{ github.ref_name }}
          # Extract version without the 'v' prefix for script
          CLEAN_VERSION=$(echo $TAG_VERSION | sed 's/^v//')

          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Set version in install.m4
        run: |
          # Replace the placeholder with actual version
          # Use | as a delimited because / can sometimes show up in the input
          sed -i "s|__INSTALLER_DEVELOPMENT_BUILD__|${{ steps.version.outputs.clean_version }}|g" install.m4
          # Display the change for verification in workflow logs
          echo "Updated install.m4 with version ${{ steps.version.outputs.clean_version }}"

      - name: Generate install.sh from install.m4
        run: |
          docker run --rm \
            -e PROGRAM=argbash \
            -v "$(pwd):/work" \
            -u "$(id -u):$(id -g)" \
            matejak/argbash \
            install.m4 -o install.sh

      - name: Inline ttis.sh into install.sh
        run: |
          # The released install.sh must be self-contained so it runs via
          # `bash -c "$(curl ... install.sh)"` with no second file to fetch.
          scripts/inline-ttis.sh install.sh ttis.sh

      - name: Upload install.sh as artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-script
          path: install.sh

  # Validate the pinned golden .ttis files before the install tests consume them
  # via the 'release' channel. Mirrors golden-matrix.yml; the release tests gate
  # on this so they never run against an unvalidated golden baseline.
  validate-golden:
    name: Validate golden files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch golden files
        run: |
          set -euo pipefail
          PIN=$(grep -oP '(?<=TTIS_GOLDEN_VERSIONS_TAG=")[^"]+' install.m4)
          echo "Fetching tt-sw-manifest @ ${PIN}"
          mkdir -p golden
          curl -fsSL "https://api.github.com/repos/tenstorrent/tt-sw-manifest/releases/tags/${PIN}" \
            | jq -r '.assets[] | select(.name | endswith(".ttis")) | [.name, .browser_download_url] | @tsv' \
            | while IFS=$'\t' read -r name url; do
                curl -fsSL -o "golden/${name}" "${url}"
              done

      - name: Validate all golden files
        run: |
          set -euo pipefail
          failed=0
          for f in golden/*.ttis; do
            echo "── Validating $f ──"
            if bash ttis.sh validate "$f"; then
              echo "✓ $f"
            else
              echo "✗ $f"
              failed=$((failed + 1))
            fi
          done
          if [[ "$failed" -gt 0 ]]; then
            echo "::error::$failed golden file(s) failed validation"
            exit 1
          fi
          echo "All golden files are valid."

  # Release-channel tests: gate on validate-golden so they only run against a
  # verified golden baseline (the .ttis pinned by TTIS_GOLDEN_VERSIONS_TAG).
  test-debian-ubuntu:
    name: Test Debian/Ubuntu (release)
    needs: [build, validate-golden]
    uses: ./.github/workflows/test-debian-ubuntu.yml
    with:
      artifact_name: install-script
      channel: release

  test-fedora:
    name: Test Fedora (release)
    needs: [build, validate-golden]
    uses: ./.github/workflows/test-fedora.yml
    with:
      artifact_name: install-script
      channel: release

  test-hosted-n150:
    name: Test Hosted N150 (release)
    needs: [build, validate-golden]
    uses: ./.github/workflows/test-hosted-n150.yml
    with:
      artifact_name: install-script
      channel: release

  # Rolling-channel coverage: ensures "latest of everything" still installs.
  # Does not depend on the golden baseline.
  test-debian-ubuntu-rolling:
    name: Test Debian/Ubuntu (rolling)
    needs: build
    uses: ./.github/workflows/test-debian-ubuntu.yml
    with:
      artifact_name: install-script
      channel: rolling

  # Dogfood the composite CI action against the freshly built install.sh, with no
  # hardware: container mode skips KMD/HugePages/SFPI and firmware stays off.
  test-action-container:
    name: Test CI action (container mode)
    needs: [build, validate-golden]
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download install.sh
      uses: actions/download-artifact@v4
      with:
        name: install-script

    - name: Install jq
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Run tt-installer action (container mode)
      id: tt
      uses: ./
      with:
        channel: release
        mode: container
        install-sh-path: ${{ github.workspace }}/install.sh
        export-schema-path: ${{ runner.temp }}/state.ttis
        upload-artifact: "false"

    - name: Validate exported schema
      run: |
        set -euo pipefail
        schema="${{ steps.tt.outputs.schema-path }}"
        test -f "${schema}" || { echo "::error::schema not written"; exit 1; }
        echo "✓ schema written to ${schema}"
        cat "${schema}"
        bash ttis.sh validate "${schema}"
        echo "✓ schema valid"

  test-template-syntax:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test template syntax
      run: |
        shellcheck -x install.m4
        echo "✓ Template syntax is valid"

  test-script-syntax:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download install.sh
      uses: actions/download-artifact@v4
      with:
        name: install-script

    - name: Test script syntax
      # If this fails, we should be warned but not stop entirely
      continue-on-error: true
      run: |
        shellcheck install.sh
        echo "✓ Script syntax is valid"

  test-version-fetching:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download install.sh
      uses: actions/download-artifact@v4
      with:
        name: install-script

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y jq

    - name: Test version fetching functions
      run: |
        # Source the script to test the version fetching function
        set +e  # Don't exit on function failures

        # Extract and test the generic version fetching function
        source <(grep -A 30 "fetch_latest_version()" install.sh)
        source <(grep "TT_.*_GH_REPO=" install.sh)

        echo "Testing version fetch functions..."

        # Test KMD version fetching
        if kmd_ver=$(fetch_latest_version "${TT_KMD_GH_REPO}" "ttkmd-"); then
          echo "✓ KMD version fetched: $kmd_ver"
        else
          echo "⚠ KMD version fetch failed (may be rate limited)"
        fi

        # Test FW version fetching
        if fw_ver=$(fetch_latest_version "${TT_FW_GH_REPO}" "v"); then
          echo "✓ FW version fetched: $fw_ver"
        else
          echo "⚠ FW version fetch failed (may be rate limited)"
        fi

        # Test system tools version fetching
        if systools_ver=$(fetch_latest_version "${TT_SYSTOOLS_GH_REPO}" "v"); then
          echo "✓ System tools version fetched: $systools_ver"
        else
          echo "⚠ System tools version fetch failed (may be rate limited)"
        fi

        # Test SMI version fetching
        if smi_ver=$(fetch_latest_version "${TT_SMI_GH_REPO}"); then
          echo "✓ SMI version fetched: $smi_ver"
        else
          echo "⚠ SMI version fetch failed (may be rate limited)"
        fi

        # Test Flash version fetching
        if flash_ver=$(fetch_latest_version "${TT_FLASH_GH_REPO}"); then
          echo "✓ Flash version fetched: $flash_ver"
        else
          echo "⚠ Flash version fetch failed (may be rate limited)"
        fi

        echo "✓ Version fetching functions are working"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    # Only run if the build workflow completed successfully AND it was triggered by a version tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, validate-golden, test-debian-ubuntu, test-fedora, test-hosted-n150, test-debian-ubuntu-rolling, test-action-container]

    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout the tag that triggered the original workflow
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download artifacts from build workflow
        uses: actions/download-artifact@v4
        with:
          name: install-script

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "HYBRID" # Include both PRs and direct commits
          configurationJSON: |
            {
              "template": "#{{CHANGELOG}}\n\n## Contributors\n#{{CONTRIBUTORS}}\n\n## Installation\n\nInstall this version with:\n```bash\n/bin/bash -c \"$(curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh)\"\n```\n\nLatest version can always be installed using:\n```bash\n/bin/bash -c \"$(curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh)\"\n```",
              "categories": [
                {
                  "title": "## 🔄 Changes",
                  "labels": []
                }
              ],
              "pr_template": "- #{{TITLE}} (#{{NUMBER}}) by @#{{AUTHOR}}",
              "commit_template": "- #{{TITLE}} (#{{MERGE_SHA}}) by @#{{AUTHOR}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            install.sh
            ttis.sh
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
