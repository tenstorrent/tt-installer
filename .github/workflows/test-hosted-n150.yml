name: Test Installer - Hosted N150

on:
  workflow_call:
    inputs:
      artifact_name:
        description: 'Name of the install script artifact'
        required: true
        type: string
        default: 'install-script'

jobs:
  test-hosted-n150:
    name: Test on hosted N150
    runs-on: tt-ubuntu-2204-n150-stable

    steps:
    - name: Prepare system
      run: |
        # The runners come with docker preinstalled but we want to
        # simulate a completely blank system for our Podman install
        sudo apt-get purge -y docker-ce docker-ce-cli containerd.io

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download install.sh
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}

    - name: Run installer on hosted N150
      run: |
        # Run installer with all components enabled.
        # Firmware update is explicitly disabled — never flash on the hosted N150.
        timeout 1800 sudo bash install.sh \
          --update-firmware=off \
          --mode-non-interactive \
          --verbose \
          --export-schema /tmp/tt-installer-state.ttis \
          --reboot-option=never

        echo "✓ Installer completed successfully on hosted N150"

        # The installer ran as root; make the schema readable by the runner user
        sudo chmod 644 /tmp/tt-installer-state.ttis

    - name: Schema write/validate/read
      run: |
        echo "── Schema write ──"
        test -f /tmp/tt-installer-state.ttis || { echo "✗ Schema not written"; exit 1; }
        echo "✓ Schema written:"
        cat /tmp/tt-installer-state.ttis

        echo "── Schema validate ──"
        bash ttis.sh validate /tmp/tt-installer-state.ttis
        echo "✓ Schema valid"

        echo "── Schema import round-trip ──"
        PKG_MANAGER=apt-get bash -c '
          source ttis.sh
          ttis_import /tmp/tt-installer-state.ttis
          [[ "${_arg_install_kmd:-}" =~ ^(on|off)$ ]] || { echo "✗ _arg_install_kmd not set"; exit 1; }
          echo "✓ _arg_install_kmd=${_arg_install_kmd}"
          [[ "${_arg_install_tt_smi:-}" =~ ^(on|off)$ ]] || { echo "✗ _arg_install_tt_smi not set"; exit 1; }
          echo "✓ _arg_install_tt_smi=${_arg_install_tt_smi}"
        '
        echo "✓ Schema import round-trip complete"

    - name: Core smoke tests
      run: |
        set -euo pipefail
        echo "── tt-smi ──"
        tt-smi --version
        echo "── KMD loaded ──"
        lsmod | grep tenstorrent
        echo "── tt-flash ──"
        tt-flash --version
        echo "✓ Core smoke tests passed"

    - name: Run tt-metalium workload
      run: |
        METALIUM_IMAGE="ghcr.io/tenstorrent/tt-metal/tt-metalium-ubuntu-22.04-release-amd64:latest-rc"

        # Pull image (installer may have already cached it; a pull failure is non-fatal —
        # the run below will surface a more actionable error if the image is absent)
        sudo docker pull "${METALIUM_IMAGE}" || true

        sudo docker run --rm \
          --privileged \
          --log-driver none \
          --volume=/dev/hugepages-1G:/dev/hugepages-1G \
          --volume="${PWD}/tests/metalium-workload.py:/metalium-workload.py:ro" \
          --device=/dev/tenstorrent:/dev/tenstorrent \
          --network=host \
          --security-opt label=disable \
          --entrypoint python3 \
          "${METALIUM_IMAGE}" \
          /metalium-workload.py

        echo "✓ tt-metalium container workload complete"
